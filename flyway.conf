# Flyway configuration

flyway.url=jdbc:mysql://localhost:3307/testproject?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Hong_Kong
flyway.user=testuser
flyway.password=testuser

# Migration script location
flyway.locations=filesystem:src/main/resources/db/migration

# Set to true ONCE on the first run against the existing database to baseline it,
# then set back to false after baselining.
flyway.baselineOnMigrate=false
flyway.baselineVersion=0

flyway.outOfOrder=false
flyway.validateOnMigrate=true
